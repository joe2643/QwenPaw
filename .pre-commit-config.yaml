repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-ast
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: sort-simple-yaml
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-yaml
        exclude: |
          (?x)^(
              meta.yaml
          )$
      - id: check-xml
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-toml
      - id: check-docstring-first
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: check-json
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: fix-encoding-pragma
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
      - id: detect-private-key
      - id: trailing-whitespace
        exclude: '(?x)(.*/skills/.*|^scripts/pack/)'
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        exclude: '(?x)(.*/skills/.*|^scripts/pack/|^tests/)'
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        exclude:
          (?x)(
          pb2\.py$
          | grpc\.py$
          | ^docs
          | ^tests/
          | \.html$
          | .*/skills/.*
          )
        args: [
          --ignore-missing-imports,
          --disable-error-code=var-annotated,
          --disable-error-code=union-attr,
          --disable-error-code=assignment,
          --disable-error-code=attr-defined,
          --disable-error-code=import-untyped,
          --disable-error-code=truthy-function,
          --follow-imports=skip,
          --explicit-package-bases,
        ]
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: [ --line-length=79 ]
        exclude: '(?x)(.*/skills/.*|^scripts/pack/|^tests/)'
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        # E501 line-too-long deferred to black (single source of truth);
        # E203 disagrees with PEP 8 on slice colons.
        # F541 (f-string without placeholder) is harmless and common
        # when threading an f-prefix for future placeholder additions.
        # E231 (missing whitespace after comma) — black's call.
        # E741 (ambiguous var name) — too noisy for short helpers.
        # F841 (unused local) — common in test fixtures.
        args: [ "--extend-ignore=E203,E501,F541,E231,E741,F841,E402,F811"]
        exclude: '(?x)(.*/skills/.*|^scripts/pack/|^tests/)'
  - repo: https://github.com/pylint-dev/pylint
    rev: v3.0.2
    hooks:
      - id: pylint
        exclude:
          (?x)(
          ^docs
          | ^tests/
          | pb2\.py$
          | grpc\.py$
          | \.demo$
          | \.md$
          | \.html$
          | .*/skills/.*
          )
        args: [
          --disable=W0511,
          --disable=W0718,
          --disable=W0122,
          --disable=C0103,
          --disable=R0913,
          --disable=E0401,
          --disable=E1101,
          --disable=C0415,
          --disable=W0603,
          --disable=R1705,
          --disable=R0914,
          --disable=E0601,
          --disable=W0602,
          --disable=W0604,
          --disable=R0801,
          --disable=R0902,
          --disable=R0903,
          --disable=C0123,
          --disable=W0231,
          --disable=W1113,
          --disable=W0221,
          --disable=R0401,
          --disable=W0632,
          --disable=W0123,
          --disable=C3001,
          --disable=W0201,
          --disable=C0302,
          --disable=W1203,
          --disable=C2801,
          --disable=C0114,  # Disable missing module docstring for quick dev
          --disable=C0115,  # Disable missing class docstring for quick dev
          --disable=C0116,  # Disable missing function or method docstring for quick dev
          --disable=C0301,  # line-too-long: black is the single source of truth
          --disable=W1510,  # subprocess-run-check: explicit check= often unwanted
          --disable=W1514,  # unspecified-encoding: too noisy on legacy code paths
          --disable=W0102,  # dangerous-default-value: legacy callers, audited cases
          --disable=R0912,  # too-many-branches: refactor target, not blocker
          --disable=R0915,  # too-many-statements: same
          --disable=R0911,  # too-many-return-statements: same
          --disable=R0904,  # too-many-public-methods: same
          --disable=R0917,  # too-many-positional-arguments: same
          --disable=R0916,  # too-many-boolean-expressions: same
          --disable=R1702,  # too-many-nested-blocks: same
          --disable=W0613,  # unused-argument: common in mock signatures and base classes
          --disable=W0621,  # redefined-outer-name: pytest-fixture pattern
          --disable=W0404,  # reimported: harmless, sometimes intentional
          --disable=W0707,  # raise-missing-from: not always informative
          --disable=W0212,  # protected-access: white-box internal calls in this codebase
          --disable=W0611,  # unused-import: triggers on conditional imports
          --disable=W0612,  # unused-variable: common in unpack patterns
          --disable=W0706,  # try-except-raise: legitimate in retry/audit code
          --disable=W1309,  # f-string-without-interpolation: harmless
          --disable=W1404,  # implicit-str-concat: intentional for long messages
          --disable=C0411,  # wrong-import-order: too noisy across legacy modules
          --disable=C0412,  # ungrouped-imports: same
          --disable=C0413,  # wrong-import-position: deferred-import pattern
          --disable=C0207,  # use-maxsplit-arg: minor refactor target
          --disable=R1714,  # consider-using-in: refactor target, not blocker
          --disable=R1735,  # use-dict-literal: refactor target
        ]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.0.0'
    hooks:
      - id: prettier
        additional_dependencies: [ 'prettier@3.0.0' ]
        files: \.(tsx?)$
        exclude: '(?x)(^web/|^console/|/dist/|.*/skills/.*|^scripts/pack/)'
